<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tambah</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Form tambah Tanaman</h1>
    <form id="formTambah">
      
      
      <label> Nama Tanaman</label>
      <input type="text" id="namatanaman" />
      
      <label> Warna</label>
      <input type="text" id="warna" />
      
      <label>Jenis</label>
      <select id="jenis">
        <option value="perdu">Perdu</option>
        <option value="kayu">Kayu</option>
        <option value="herbal">Herbal</option>
      </select>
      
      <button id="tombol" type="submit">simpan</button>
      <a href="daftar.html">Daftar Tanaman</a>
    </form>
  </div>
  
  <script type="module">
    import { tambahDataTanaman } from './main.js'
    
    //mengirimkan data tanaman ke form
    const formTambah = document.getElementById('formTambah')
    
    //event ketika form disumbit
    formTambah.addEventListener('submit', function(e) {
      //pencegah reload halaman
      e.preventDefault()
      
      tambahDataTanaman()
    })
  </script>
     <script src="autentikasi.js"></script>
</body>

</html>
